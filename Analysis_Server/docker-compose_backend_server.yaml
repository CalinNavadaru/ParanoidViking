
services:
  web:
    build:
      context: .
      args:
        PORT: "${PORT}"
    image: phish-detector-web:latest
    container_name: phish-web
    expose:
      - "${PORT}"
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app:rw
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - phish-net

  nginx:
    image: nginx:stable-alpine
    container_name: phish-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
    networks:
      - phish-net

networks:
  phish-net:
    external: true